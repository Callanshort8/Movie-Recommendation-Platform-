<!DOCTYPE html>
<html>
<head>
    <title>Browse Recommendated Movies</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="api.js"></script>
    
</head>

<body class="bg-dark text-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">
      <img src="logo.png" width="40">
    </a>

    <ul class="navbar-nav mx-auto flex-row">
      <li class="nav-item">
        <a class="nav-link mx-3" href="browser.html">Browse</a>
      </li>
      <li class="nav-item">
        <a class="nav-link mx-3" href="recommendation.html">Recommendations</a>
      </li>
      <li class="nav-item">
        <a class="nav-link mx-3" href="ratings.html">My Ratings</a>
      </li>
        <li class="nav-item">
        <a class="nav-link mx-3" href="dashboard.html">Dashboard</a>
      </li>
    </ul>

    <img src="profile.jpg" width="40" class="rounded-circle">
  </div>
</nav>

<h1 class="mt-2 ms-2 text-center">Recommended Movies</h1>

<div class="card m-4">
    <div class="card-body bg-secondary text-light">
        <p>These movie recommendations have been chosen for you based on your previous movies you have watched and rated.</p>
    </div>
</div>

<div class="card m-4 bg-secondary">
    <div class="card-body">
        <div class="container text-center">
            <div class = "row" id="recs-grid">

            </div>
            </div>
        </div>
    </div>
</div>
<script>
    requireAuth();

    async function loadRecs() {
        const data = await apiGet("/api/recommendations");

        document.getElementById("recs-grid").innerHTML = data.movies.map(m => `
        <div class = "col-md-4"> 
            <div class = "card bg-dark text-light border-0 h-100">
                <img src = "${m.poster_url || 'placeholder.jpg'}" class="card-img-top">
                <div class = "card-body d-flex flex-column text-center">
                    <h5 class = "card-title">${m.title}</h5>
                    <p class = "card-text">Year: ${m.year || 'N/A'}</p>
                    <p class = "card-text">Ratings: ${m.rating ? m.rating.toFixed(1) + '/10' : 'N/A'}</p>
                    <a href="#" class ="btn btn-secondary mt-auto">Watch now</a>
                </div>
            </div>
        </div>
        `).join("");
    }
    loadRecs();
</script>
</body>
</html>
