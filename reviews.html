<!DOCTYPE html>
<html>
  <head>
    <title>Reviews</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="api.js"></script>
    
  </head>

   <body class="bg-dark text-light">
     <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">
      <img src="logo.png" width="40">
    </a>
      
      <ul class="navbar-nav mx-auto flex-row">

        <li class="nav-item">
          <a class="nav-link mx-3" href="dashboard.html">Dashboard</a>
        </li>

        <li class="nav-item">
          <a class="nav-link mx-3" href="movies.html">Movies</a>
        </li>

        <li class="nav-item">
          <a class="nav-link mx-3" href="reviews.html">Reviews</a>
        </li>

      </ul>
      
      <img src="profile.jpg" width="40" class="rounded-circle">
  </div>
</nav>

     <div class="container mt-4">

       <h3>Reviews</h3>

         <div class="section-card mb-4 bg-secondary">
        <h5>Review Statistics</h5>

        <div class="row mt-3">
          <div class="col-md-4">
            <div class="card bg-dark text-light p-3 text-center" id="stat-pending">
              Pending Reviews: -
            </div>
          </div>
          <div class="col-md-4">
            <div class="card bg-dark text-light p-3 text-center" id="stat-approved">
              Approved Reviews: -
            </div>
          </div>
          <div class="col-md-4">
            <div class="card bg-dark text-light p-3 text-center" id="stat-rejected">
              Rejected Reviews: -
            </div>
          </div>
            
        </div>
    </div>

       <div class="section-card mb-4 bg-secondary">
         <h5>Filter Reviews</h5>

         <div class="d-flex justify-content-between mt-3">
           <button class="btn btn-dark" onclick="loadReviews('all')">All</button>
           <button class="btn btn-dark" onclick="loadReviews('pending')">Pending</button>
           <button class="btn btn-dark" onclick="loadReviews('approved')">Approved</button>
           <button class="btn btn-dark" onclick="loadReviews('rejected')">Rejected</button>
         </div>
       </div>

       <div class="section-card bg-secondary">
         <h5 class="mb-3">Review List</h5>

         <div id = "review-list">
     </div>
     </div>
     <script>
        requireAuth();
        let currentFilter = "all";
        function renderReview(r) {
          const statusColor = {pending: "warning", approved: "success", rejected: "danger" }[r.status] || "secondary";
          return `
            <div class = "review-card mb-3" id="review-${r.id}">
              <div class = "d-flex justify-content-between">
                <div>
                  <strong>${r.movieTitle}</strong><br>
                  <small>${r.username}</small><br>
                  <small>Rating: ${r.rating}/10</small>
                </div>
                <div class = "text-${statusColor}">${r.status}</div>
                </div>
                <div class = "mt-3">
                  <input type="text" class="form-control" value="${r.content}" readonly>
                </div>  
                ${r.status == "pending" ? `
                <div class = "mt-3">
                  <button class="btn btn-success btn-sm" onclick="updateReview(${r.id}, 'approved')">Approve</button>
                  <button class="btn btn-danger btn-sm" onclick="updateReview(${r.id}, 'rejected')">Reject</button>
                </div>` : ""}
              </div>`;
        }

        async function loadReviews(filter = "all") {
          currentFilter = filter;
          const path = filter === "all" ? "/api/admin/reviews" : `/api/admin/reviews?status=${filter}`;
          const data = await apiGet(path);
          document.getElementById("review-list").innerHTML = data.reviews.map(renderReview).join("");
          document.getElementById("stat-pending").textContent = "Pending: " + (data.stats?.pending ?? 0);
          document.getElementById("stat-approved").textContent = "Approved: " + (data.stats?.approved ?? 0);
          document.getElementById("stat-rejected").textContent = "Rejected: " + (data.stats?.rejected ?? 0); 
        }

        async function updateReview(id, status) {
          await apiPost(`/api/admin/reviews/${id}`, { status });
          loadReviews(currentFilter);
        }

        loadReviews();
     </script>
   </body>
</html>
