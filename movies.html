<!DOCTYPE html>
<html>
  <head>
    <title>Movies</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="api.js"></script>
    
  </head>

  <body class="bg-dark text-light">
     <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">
      <img src="logo.png" width="40">
    </a>
      
      <ul class="navbar-nav mx-auto flex-row">

        <li class="nav-item">
          <a class="nav-link mx-3" href="dashboard.html">Dashboard</a>
        </li>

        <li class="nav-item">
          <a class="nav-link mx-3" href="movies.html">Movies</a>
        </li>

        <li class="nav-item">
          <a class="nav-link mx-3" href="reviews.html">Reviews</a>
        </li>

      </ul>
      
      <img src="profile.jpg" width="40" class="rounded-circle">
  </div>
</nav>

    <div class="container mt-4">
      <h3>Movies</h3>

      <div class="section-card mb-4 d-flex justify-content-between align-items-center bg-secondary text-light">
        <h5>Movie Management</h5>
        <button class="btn btn-dark" onclick="window.location.href='add-movie.html'">AddMovie</button>
      </div>

      <div class="section-card bg-secondary text-light">
        <h5 class="mb-3">Movie Table</h5>

        <table class="table table-dark table-hover">

          <thead>
            <tr>
              <th>Title</th>
              <th>Year</th>
              <th>Director</th>
              <th>Ratings</th>
              <th>Actions</th>
            </tr>
          </thead>

          <tbody id = "movieTableBody">
          </tbody>
        </table>
      </div>
    </div>
    <script>
      requireAuth()
      async function loadMovies() {
        const data = await apiGet("/api/movies");
        const tbody = document.getElementById("movieTableBody");
        tbody.innerHTML = data.movies.map(m => `
        <tr>
            <td>${m.title}</td>
            <td>${m.year}</td>
            <td>${m.director}</td>
            <td>${m.rating?.toFixed(1) ?? "-"}</td>
            <td>
              <button class="btn btn-secondary btn-sm" onclick="editMovie(${m.id})">Edit</button>
              <button class="btn btn-danger btn-sm" onclick="deleteMovie(${m.id})">Delete</button>
            </td>
        </tr>
        `).join("");
      }

      async function deleteMovie(id) {
        if (!confirm("Delete this movie?")) return;
        await fetch(`${API}/api/movies/${id}`, {
          method: "DELETE", headers: authHeaders()
        });
        loadMovies();
      }

      function editMovie(id) {
        window.location.href = `edit-movie.html?id=${id}`;
      }

      loadMovies();
    </script>
  </body>
</html>
