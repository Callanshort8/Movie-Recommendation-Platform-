<!DOCTYPE html>
<html>
<head>
    <title>Browse Movies</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">
      <img src="logo.png" width="40">
    </a>
    <ul class="navbar-nav mx-auto flex-row">
      <li class="nav-item">
        <a class="nav-link mx-3" href="browser.html">Browse</a>
      </li>
      <li class="nav-item">
        <a class="nav-link mx-3" href="recommendation.html">Recommendations</a>
      </li>
      <li class="nav-item">
        <a class="nav-link mx-3" href="ratings.html">My Ratings</a>
      </li>
    </ul>

    <img src="profile.jpg" width="40" class="rounded-circle">
  </div>
</nav>

    <div class = "container bg-dark text-light p-4 rounded">
    <h3>Browse Movies</h3>

    <div class="card p-4 mb-4 bg-secondary text-light">
        <h5>Search and filter</h5>

        <input type="text" class="form-control mb-3 bg-dark text-light" placeholder="Search Movie Title">

        <select id="genre-select" class="form-select bg-dark text-light" disabled>
            <option>All genres coming soon</option>
        </select>
    </div>

    <div class="card m-4 bg-secondary">
        <div class="card-body">
            <div class="container text-center">
                <div class="row g-4" id="movie-grid">
                </div>
            </div>
        </div>
    </div>




    <script src="api.js"></script>
    <script>
        requireAuth();
        const searchInput = document.querySelector('input[type="text"]');
        const movieGrid = document.getElementById('movie-grid');

        async function Search() {
            const query = searchInput.value.trim();
            if (!query) return;
            const data = await apiGet(`/api/movies/search?query=${encodeURIComponent(query)}`);
            movieGrid.innerHTML = data.results.map(m => `
            <div class="col-md-4">
               <div class = "card bg-dark text-light border-0 h-100">
                    <img src="${m.poster_url || 'placeholder.jpg'}" class="card-img-top">
                    <div class="card-body d-flex flex-column text-center">
                        <h5 class="card-title">${m.title}</h5>
                        <p class = "card-text">Year: ${m.releaseYear || 'N/A'}</p>
                        <button onclick="addToWatchlist(${m.tmdbId})" class="btn btn-secondary mt-auto">+ Watchlist</button>
                    </div>
                </div>
            </div>
        `).join('');
        }

        async function loadAllMovies() {
            const data = await apiGet("/api/movies")
            movieGrid.innerHTML = data.movies.map(m => `
                <div class="col-md-4">
                 <div class="card bg-dark text-light border-0 h-100">
                    <img src="${m.poster_url || 'placeholder.jpg'}" class="card-img-top">
                    <div class="card-body d-flex flex-column text-center">
                        <h5 class="card-title">${m.title}</h5>
                        <p class="card-text">Year: ${m.year ?? "N/A"}</p>
                        <button onclick="addToWatchlist(${m.id})"
                            class = "btn btn-secondary mt-auto">+ WatchList</button>
                    </div>
                </div>
            </div>
            `).join("");
        }

        async function addToWatchlist(id) {
            await fetch(`${API}/api/watchlist/${id}`, {
                method: 'POST', headers: authHeaders()
            });
            alert('Added to watchlist');
        }

    searchInput.addEventListener('keydown', e => {if (e.key === 'Enter') Search(); });
    loadAllMovies();
    </script>
</body>
</html>
