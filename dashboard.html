<!DOCTYPE html>
<html>
  <head>
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>

  <body class="bg-dark text-light">
     <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">
      <img src="logo.png" width="40">
    </a>
      
      <ul class="navbar-nav mx-auto flex-row">

        <li class="nav-item">
          <a class="nav-link mx-3" href="dashboard.html">Dashboard</a>
        </li>

        <li class="nav-item">
          <a class="nav-link mx-3" href="movies.html">Movies</a>
        </li>

        <li class="nav-item">
          <a class="nav-link mx-3" href="reviews.html">Reviews</a>
        </li>

      </ul>
      
      <img src="profile.jpg" width="40" class="rounded-circle">
  </div>
</nav>

    <div class="container mt-4">
    <div class="card p-4 mb-4 bg-secondary">
        <h3 class="mb-4">Statistics</h3>

        <div class="row text-center">
            <div class="col-3 d-flex">
                <div class="card p-3 bg-dark text-light">
                    <p>Total Movies</p>
                    <h4 id ="stat-movies">-</h4>
                </div>
            </div>

            <div class="col-3 d-flex">
                <div class="card p-3 bg-dark text-light">
                    <p>Total Reviews</p>
                    <h4 id="stat-reviews">-</h4>
                </div>
            </div>

          <div class="col-3 d-flex">
                <div class="card p-3 bg-dark text-light">
                    <p>Pending Reviews</p>
                    <h4 id = "stat-pending">-</h4>
                </div>
            </div>
          
            <div class="col-3 d-flex">
                <div class="card p-3 bg-dark text-light">
                    <p>Total Users</p>
                    <h4 id = "stat-users">-</h4>
                </div>
            </div>
        </div>
    </div>
</div>
    <div class="container mt-4">
      <div class="card p-4 bg-secondary">
        <h3 class="mb-3">Recent Activity</h3>
        <div id="activityList">

        <div class="card bg-dark text-light p-3 mb-2">
          <p class="mb-0">Activity 1</p>
        </div>

        <div class="card bg-dark text-light p-3 mb-2">
          <p class="mb-0">Activity 2</p>
        </div>

        <div class="card bg-dark text-light p-3 mb-2">
          <p class="mb-0">Activity 3</p>
        </div>

        <div class="card bg-dark text-light p-3 mb-2">
          <p class="mb-0">Activity 4</p>
        </div>
    </div>
    </div>
</div>
    <script src = "api.js"></script>
    <script>
        requireAuth();
        async function loadStats(){
          const data = await apiGet("/api/admin/stats");
          document.getElementById("stat-movies").textContent = data.totalMovies ?? "-";
          document.getElementById("stat-reviews").textContent = data.totalReviews ?? "-";
          document.getElementById("stat-pending").textContent = data.pendingReviews ?? "-";
          document.getElementById("stat-users").textContent = data.totalUsers ?? "-";

          const activity = await apiGet("/api/admin/activity");
          const list = document.getElementById("activityList");
          list.innerHTML = activity.items.map(item => `
            <div class="card bg-dark text-light p-3 mb-2">
              <p class="mb-0">${item.description}</p>
              <small class="text-muted">${new Date(item.timestamp).toLocaleString()}</small>
              </div>
          `).join("");
          }
        loadStats();
    </script>
  </body>
</html>
