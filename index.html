<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <script src="api.js"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-light d-flex justify-content-center align-items-center" style="height: 100vh;">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">
      <img src="logo.png" width="40">
    </a>

    <ul class="navbar-nav mx-auto flex-row">
      <li class="nav-item">
        <a class="nav-link mx-3" href="browser.html">Browse</a>
      </li>
      <li class="nav-item">
        <a class="nav-link mx-3" href="index.html">Recommendations</a>
      </li>
      <li class="nav-item">
        <a class="nav-link mx-3" href="ratings.html">My Ratings</a>
      </li>
    </ul>

    <img src="profile.jpg" width="40" class="rounded-circle">
  </div>
</nav>
    <div class="card bg-secondary p-4" style="width: 350px;">
        <h3 class="text-center mb-4">Login</h3>

        <form id="loginForm">

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input id = "email" type="email" class="form-control bg-dark text-light" placeholder="Enter your email">
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input id= "password" type="password" class="form-control bg-dark text-light" placeholder="Enter your password">
            </div>

            <button type="submit" class="btn btn-dark w-100 mt-3">Login</button>

        </form>

        <p class="text-center mt-3 mb-0" style="font-size: 0.9rem;">
            Don’t have an account? <a href="#" class="text-light">Register</a>
        </p>
    </div>

<script>
      document.getElementById("loginForm").addEventListener("submit", async function(e) {
       e.preventDefault();

       const email = document.getElementById("email").value;
       const password = document.getElementById("password").value;

      const form = new URLSearchParams();
            form.append("username", email);
            form.append("password", password);
       try {
        const response = await fetch(`${API}/login`, {
          method: "POST",
          headers: {
            "Content-Type": "application/x-www-form-urlencoded"
          },
          body: form
        })
        const data = await response.json();

        if (response.ok) {
          localStorage.setItem("token", data.access_token);
          localStorage.setItem("role", data.role)

          if (data.role === "admin") {
            window.location.href = "dashboard.html";
          } else {
            window.location.href = "browser.html"
          }

        }else {
          alert(data.detail || "login failed");
        }
       } catch (error) {
        console.error(error);
        alert("server error");
       }
      })
    </script>
</body>
</html>
